<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --win-bg:#10103a; --win-border:#e8e8ff; --gold:#ffd84a; --red:#ff5a4a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'DotGothic16',monospace;color:#fff}
#stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#000}
/* ===== ゲーム画面まわりの余白(ドット絵風の夜空) ===== */
#screenArea{flex:1 1 auto;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:
 radial-gradient(circle at 85% 14%, #fff8e4 0 12px, rgba(255,233,168,.4) 12px 24px, rgba(255,233,168,0) 24px 42px),
 radial-gradient(circle at 14% 18%, rgba(255,255,255,.9) 0 2px, transparent 3px),
 radial-gradient(circle at 78% 55%, rgba(255,255,255,.7) 0 2px, transparent 3px),
 radial-gradient(circle at 46% 30%, rgba(255,255,255,.85) 0 1.5px, transparent 2.5px),
 radial-gradient(circle at 30% 72%, rgba(200,210,255,.8) 0 2px, transparent 3px),
 radial-gradient(circle at 8% 86%, rgba(255,255,255,.6) 0 1.5px, transparent 2.5px),
 radial-gradient(circle at 60% 88%, rgba(200,210,255,.7) 0 1.5px, transparent 2.5px),
 radial-gradient(circle at 92% 82%, rgba(255,255,255,.6) 0 2px, transparent 3px),
 radial-gradient(circle at 55% 14%, rgba(255,255,255,.5) 0 1.5px, transparent 2.5px),
 linear-gradient(180deg,#1c1a4a 0%,#161342 45%,#100e30 100%)}
#cvwrap{position:relative;width:100%;max-width:760px;margin:0 auto;flex:0 0 auto}
canvas#cv{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges;background:#000}

/* ===== RPG風ウィンドウ ===== */
.window{
  position:absolute;background:var(--win-bg);
  border:3px solid var(--win-border);border-radius:8px;
  box-shadow:0 0 0 3px #10103a, 0 4px 0 rgba(0,0,0,.5);
  padding:10px 12px;font-size:15px;line-height:1.7;letter-spacing:1px;
  text-shadow:1px 1px 0 #000;z-index:20;
}
#msgwin{left:3%;right:3%;bottom:4%;min-height:84px;display:none}
#msgname{color:var(--gold);font-size:14px;margin-bottom:2px}
#msgtext{white-space:pre-wrap;font-size:15px}
#msgnext{position:absolute;right:12px;bottom:6px;color:#fff;animation:bob 0.6s infinite alternate;font-size:13px}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(3px)}}

#menuwin{left:50%;top:50%;transform:translate(-50%,-50%);min-width:240px;max-width:92%;display:none;max-height:86%;overflow-y:auto}
#menutitle{color:var(--gold);text-align:center;border-bottom:2px solid #444a8a;padding-bottom:6px;margin-bottom:6px;font-size:16px}
.mbtn{
  display:flex;justify-content:space-between;gap:10px;width:100%;
  background:transparent;border:none;color:#fff;font-family:inherit;font-size:15px;
  padding:9px 8px;text-align:left;cursor:pointer;border-radius:4px;letter-spacing:1px;text-shadow:1px 1px 0 #000;
}
.mbtn:active,.mbtn:hover{background:#2a2a6a}
.mbtn.sel{background:#2a2a6a;box-shadow:inset 0 0 0 2px #8a90ff}
.mbtn.sel>span:first-child::before{content:'▶ ';color:#ffd84a}
.mbtn .price{color:var(--gold)}
.mbtn.disabled{color:#777;pointer-events:none}
.msub{color:#9ad;font-size:12px;padding:0 8px 6px}

/* ===== フルスクリーンオーバーレイ(タイトル/ストーリー等) ===== */
.overlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.overlay.show{display:flex}

#titleScr{background:linear-gradient(#7ec8f0 0%,#bfe6f7 45%,#f4e7b0 55%,#e9d27a 75%,#7ec45e 100%)}
#titleScr .tcloud{position:absolute;top:6%;left:-20%;width:140%;height:30%;background:
 radial-gradient(closest-side,#fff 60%,transparent 61%) 10% 60%/120px 60px no-repeat,
 radial-gradient(closest-side,#fff 60%,transparent 61%) 45% 30%/180px 70px no-repeat,
 radial-gradient(closest-side,#fff 60%,transparent 61%) 80% 65%/140px 60px no-repeat;opacity:.8;animation:cloudmove 28s linear infinite}
@keyframes cloudmove{from{transform:translateX(0)}to{transform:translateX(18%)}}
#titleMain{font-size:min(15vw,86px);color:#1a1208;text-shadow:3px 3px 0 #fff,6px 6px 0 rgba(0,0,0,.25);letter-spacing:4px;z-index:2}
#title30{display:inline-block;color:#6b4a17;background:linear-gradient(#caa24a,#8a6420);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(3px 3px 0 #fff) drop-shadow(5px 5px 0 rgba(0,0,0,.25));font-size:1.25em}
#titleSub{font-size:min(4.6vw,24px);color:#7a5a10;background:linear-gradient(#fff7d0,#e8b93a 60%,#9a7414);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.35));letter-spacing:3px;margin-top:4px;z-index:2}
#titleKana{font-size:min(3.4vw,16px);color:#333;z-index:2;margin-top:2px}
#titlePress{margin-top:34px;font-size:min(4.5vw,20px);color:#fff;text-shadow:2px 2px 0 #000;animation:blink 1.1s steps(2) infinite;z-index:2}
#titleCopy{position:absolute;bottom:10px;width:100%;font-size:11px;color:#234;z-index:2}
@keyframes blink{50%{opacity:0}}

#storyScr{background:#000;justify-content:center;padding:8% 6%}
#storyText{font-size:min(4.3vw,19px);line-height:2.1;text-align:center;white-space:pre-wrap;letter-spacing:2px;max-height:80vh;overflow-y:auto;width:100%}
#storyText em{font-style:normal;color:#e08040}
#storySkip{position:absolute;right:14px;bottom:12px;font-size:13px;color:#bbb;border:2px solid #888;border-radius:4px;padding:3px 12px;background:#111}

#resultScr,#overScr,#endScr{background:rgba(0,0,0,.93);padding:6%}
.bigword{font-size:min(11vw,56px);letter-spacing:6px;margin-bottom:18px}
#overScr .bigword{color:var(--red);text-shadow:0 0 14px #a00,2px 2px 0 #400}
#resultScr .bigword,#endScr .bigword{color:var(--gold);text-shadow:0 0 14px #a80,2px 2px 0 #420}
.subtext{font-size:min(4.4vw,18px);line-height:2;white-space:pre-wrap}
.bigbtn{margin-top:26px;font-family:inherit;font-size:min(5vw,20px);color:#fff;background:#23237a;border:3px solid #e8e8ff;border-radius:8px;padding:10px 34px;letter-spacing:3px;cursor:pointer;text-shadow:1px 1px 0 #000}
.bigbtn:active{transform:translateY(2px)}

/* ===== バーチャルパッド ===== */
#controls{flex:0 0 200px;width:100%;max-width:760px;position:relative;background:
 repeating-linear-gradient(45deg,#15151d 0 8px,#101018 8px 16px)}
#dpad{position:absolute;left:14px;bottom:14px;width:138px;height:138px}
.dbtn{position:absolute;width:46px;height:46px;background:#2c2c40;border:2px solid #555a80;border-radius:9px;color:#cfd2ff;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.dbtn:active,.dbtn.on{background:#4a4ad0;border-color:#aab0ff}
#d-up{left:46px;top:0}#d-down{left:46px;bottom:0}#d-left{left:0;top:46px}#d-right{right:0;top:46px}
#abtn{position:absolute;right:18px;bottom:64px;width:68px;height:68px;border-radius:50%;background:#b03030;border:3px solid #ff9090;color:#fff;font-size:24px;font-family:inherit;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #601010}
#abtn:active{transform:translateY(3px);box-shadow:0 1px 0 #601010}
#bbtn{position:absolute;right:92px;bottom:22px;width:60px;height:60px;border-radius:50%;background:#2858b0;border:3px solid #90b8ff;color:#fff;font-size:21px;font-family:inherit;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #102860}
#bbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #102860}
#bbtn small{position:absolute;bottom:-18px;font-size:10px;color:#89a;white-space:nowrap}
#fleebtn{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:none;z-index:25;font-family:inherit;background:var(--win-bg);border:3px solid var(--win-border);color:#fff;border-radius:8px;padding:9px 28px;font-size:15px;letter-spacing:2px;box-shadow:0 4px 0 rgba(0,0,0,.5);text-shadow:1px 1px 0 #000}
#fleebtn:active{transform:translate(-50%,3px);box-shadow:0 1px 0 rgba(0,0,0,.5)}
#padhint{position:absolute;top:8px;width:100%;text-align:center;font-size:11px;color:#667}
</style>

<body>
<div id="stage">
  <div id="screenArea">
  <div id="cvwrap">
    <canvas id="cv" width="352" height="198"></canvas>

    <div id="msgwin" class="window">
      <div id="msgname"></div>
      <div id="msgtext"></div>
      <div id="msgnext">▼</div>
    </div>

    <div id="menuwin" class="window">
      <div id="menutitle"></div>
      <div id="menubody"></div>
    </div>

    <div id="titleScr" class="overlay show">
      <div class="tcloud"></div>
      <div id="titleMain">勇者<span id="title30">30</span><ruby>秒</ruby></div>
      <div id="titleKana">ゆうしゃ さんじゅうびょう</div>
      <div id="titleSub">SUPER SPEED HERO</div>
      <div id="titlePress">PRESS ANY BUTTON</div>
      <div id="titleCopy">RETRO SPEED RPG - MADE WITH CLAUDE</div>
    </div>

      <div id="storyText"></div>

    </div>

<script>
/* ============ 勇者30秒 ============ */
"use strict";
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const VW = 352, VH = 198, TILE = 16, HUD_H = 22;

/* ---------- サウンド (WebAudio チップチューン) ---------- */
let AC = null, bgmMaster = null;
function audio(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC && !bgmMaster){ bgmMaster = AC.createGain(); bgmMaster.gain.value = 0.5; bgmMaster.connect(AC.destination); }
  if(AC && AC.state==='suspended') AC.resume();
}
function beep(freq, dur, type='square', vol=0.12, when=0){
  if(!AC) return;
  const t = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02);
}
const SE = {
  hit(){ beep(160,0.08,'square',0.14); beep(90,0.1,'sawtooth',0.1,0.02); },
  heroHit(){ beep(520,0.05,'square',0.12); beep(760,0.06,'square',0.1,0.04); },
  coin(){ beep(990,0.06,'square',0.1); beep(1320,0.1,'square',0.1,0.06); },
  lvup(){ [523,659,784,1047].forEach((f,i)=>beep(f,0.12,'square',0.12,i*0.09)); },
  goddess(){ [880,1175,1760].forEach((f,i)=>beep(f,0.3,'triangle',0.12,i*0.12)); },
  cursor(){ beep(880,0.04,'square',0.08); },
  buy(){ beep(660,0.07,'square',0.1); beep(880,0.09,'square',0.1,0.07); },
  no(){ beep(180,0.15,'square',0.12); },
  flee(){ [600,500,400,300].forEach((f,i)=>beep(f,0.06,'square',0.1,i*0.05)); },
  tick(){ beep(1200,0.03,'square',0.07); },
  clear(){ [523,523,523,659,784,1047].forEach((f,i)=>beep(f,0.16,'square',0.13,i*0.13)); },
  over(){ [440,392,330,262,196].forEach((f,i)=>beep(f,0.3,'triangle',0.14,i*0.22)); },
  boss(){ beep(110,0.5,'sawtooth',0.16); beep(104,0.5,'sawtooth',0.14,0.1); },
};

/* ---------- BGM (チップチューン シーケンサ) ---------- */
/* 音名→周波数テーブル(C1〜B6) */
const NOTE = {};
(function(){
  const names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for(let o=1;o<7;o++) for(let i=0;i<12;i++){
    NOTE[names[i]+o] = 440*Math.pow(2,(o*12+i - (4*12+9))/12);
  }
})();
/* 譜面文字列を配列に(| は無視、. は休符) */
function S(str){ return str.replace(/\|/g,' ').trim().split(/\s+/); }

let bgm = { name:null, timer:null, voices:[] };
let noiseBuf = null;
function getNoise(){
  if(!noiseBuf){
    noiseBuf = AC.createBuffer(1, (AC.sampleRate*0.2)|0, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  }
  return noiseBuf;
}
function bgmTone(freq, dur, type, vol, time){
  if(!AC || !freq) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, time);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.exponentialRampToValueAtTime(vol, time+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, time+Math.max(0.05,dur*0.95));
  o.connect(g); g.connect(bgmMaster);
  o.start(time); o.stop(time+dur+0.02);
  bgm.voices.push(o);
  o.onended = ()=>{ const i=bgm.voices.indexOf(o); if(i>=0) bgm.voices.splice(i,1); };
}
function bgmDrum(kind, time){
  if(!AC) return;
  if(kind==='k'){ // キック
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(150,time); o.frequency.exponentialRampToValueAtTime(50,time+0.12);
    g.gain.setValueAtTime(0.20,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.13);
    o.connect(g); g.connect(bgmMaster); o.start(time); o.stop(time+0.14); bgm.voices.push(o);
  } else if(kind==='s'){ // スネア
    const s=AC.createBufferSource(), g=AC.createGain(), f=AC.createBiquadFilter();
    s.buffer=getNoise(); f.type='highpass'; f.frequency.value=2000;
    g.gain.setValueAtTime(0.13,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.12);
    s.connect(f); f.connect(g); g.connect(bgmMaster); s.start(time); s.stop(time+0.13); bgm.voices.push(s);
  } else if(kind==='h'){ // ハイハット
    const s=AC.createBufferSource(), g=AC.createGain(), f=AC.createBiquadFilter();
    s.buffer=getNoise(); f.type='highpass'; f.frequency.value=7000;
    g.gain.setValueAtTime(0.05,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.04);
    s.connect(f); f.connect(g); g.connect(bgmMaster); s.start(time); s.stop(time+0.05); bgm.voices.push(s);
  }
}
function bgmStop(){
  if(bgm.timer){ clearInterval(bgm.timer); bgm.timer=null; }
  bgm.voices.forEach(v=>{ try{ v.stop(); }catch(e){} });
  bgm.voices = [];
  bgm.name = null;
}
function bgmPlay(name){
  if(!AC || bgm.name===name) return;
  bgmStop();
  const trk = BGM[name]; if(!trk) return;
  bgm.name = name;
  const stepDur = trk.step, len = trk.len;
  const chans = trk.ch.map(c=>({ type:c.type, vol:c.vol, dur:(c.dur||0.9), seq:S(c.seq) }));
  const drum = trk.drum ? S(trk.drum) : null;
  let nextTime = AC.currentTime + 0.06, step = 0;
  const tick = ()=>{
    if(!AC) return;
    while(nextTime < AC.currentTime + 0.18){
      const s = step % len;
      chans.forEach(c=>{
        const tok = c.seq[s % c.seq.length];
        if(tok && tok!=='.') bgmTone(NOTE[tok], stepDur*c.dur, c.type, c.vol, nextTime);
      });
      if(drum){ const d = drum[s % drum.length]; if(d && d!=='.') bgmDrum(d, nextTime); }
      step++; nextTime += stepDur;
    }
  };
  tick();
  bgm.timer = setInterval(tick, 40);
}
/* 各シーンのBGM(16ステップ・ループ) */
const BGM = {
  title:{ step:0.17, len:16, ch:[
    {type:'square',  vol:0.09,         seq:"G4 C5 E5 G5 | E5 G5 C6 .  | A5 F5 A5 C6 | G5 E5 C5 ."},
    {type:'square',  vol:0.045,        seq:"E4 .  C5 .  | C5 .  E5 .  | F4 .  F5 .  | E5 .  E4 ."},
    {type:'triangle',vol:0.11, dur:1.7,seq:"C3 .  G2 .  | C3 .  G2 .  | F2 .  C3 .  | G2 .  G2 ."},
  ]},
  field:{ step:0.14, len:16, ch:[
    {type:'square',  vol:0.09,         seq:"D5 G5 B5 G5 | A5 B5 D6 B5 | C6 A5 G5 E5 | D5 .  G4 ."},
    {type:'square',  vol:0.045,        seq:"B4 .  .  .  | D5 .  .  .  | E5 .  .  .  | D5 .  B4 ."},
    {type:'triangle',vol:0.11, dur:1.6,seq:"G2 .  D3 .  | G2 .  D3 .  | C3 .  G2 .  | D3 .  D2 ."},
  ], drum:"k .  h .  | s .  h .  | k .  h .  | s .  h ." },
  town:{ step:0.18, len:16, ch:[
    {type:'square',  vol:0.085,        seq:"F5 .  A5 C6 | A5 .  G5 .  | E5 .  G5 A#5| A5 .  F5 ."},
    {type:'square',  vol:0.04,         seq:"C5 .  .  .  | F5 .  .  .  | C5 .  .  .  | C5 .  A4 ."},
    {type:'triangle',vol:0.10, dur:1.7,seq:"F3 .  C4 .  | F3 .  C4 .  | C3 .  G3 .  | F3 .  C4 ."},
  ]},
  battle:{ step:0.11, len:16, ch:[
    {type:'square',  vol:0.09,         seq:"A4 C5 E5 A5 | G#5 E5 C5 E5| F5 A5 C6 A5 | E5 C5 B4 G#4"},
    {type:'square',  vol:0.045,        seq:"E4 .  A4 .  | C5 .  A4 .  | A4 .  C5 .  | B4 .  E4 ."},
    {type:'triangle',vol:0.11, dur:1.0,seq:"A2 A2 E2 E2 | F2 F2 E2 E2 | D2 D2 C2 C2 | E2 E2 E2 E2"},
  ], drum:"k h s h | k h s h | k h s h | k h s h" },
  boss:{ step:0.135, len:16, ch:[
    {type:'square',  vol:0.085,        seq:"D4 .  F4 A4 | D5 .  A4 F4 | A#4 . A4 .  | G4 .  E4 ."},
    {type:'sawtooth',vol:0.04,         seq:"A4 .  .  .  | F5 .  .  .  | F5 .  .  .  | E5 .  D5 ."},
    {type:'triangle',vol:0.12, dur:1.0,seq:"D2 D2 D2 D2 | A2 A2 A2 A2 | A#2 A#2 A#2 A#2| A2 A2 A2 A2"},
  ], drum:"k .  s .  | k k s .  | k .  s .  | k s s s" },
  victory:{ step:0.13, len:16, ch:[
    {type:'square',  vol:0.10,         seq:"C5 E5 G5 C6 | G5 C6 E6 .  | F5 A5 C6 F6 | E6 .  C6 ."},
    {type:'square',  vol:0.05,         seq:"E4 .  .  .  | E5 .  .  .  | A4 .  .  .  | G4 .  E4 ."},
    {type:'triangle',vol:0.11, dur:1.4,seq:"C3 .  .  .  | C3 .  .  .  | F3 .  .  .  | C3 G2 C3 ."},
  ], drum:"k .  s .  | k .  s s  | k .  s .  | k s k s" },

/* 現在のシーンに対応するBGMを決定 */
function desiredBGM(){
  switch(G.scene){
    case 'title':  return 'title';
    case 'story':  return bgm.name || 'title';
    case 'field':
      if(menuOpen && (currentMenu==='town' || currentMenu==='shop')) return 'town';
      return 'field';
    case 'battle': return (G.battle && G.battle.isBoss) ? 'boss' : 'battle';
    case 'result': return 'victory';
    case 'end':    return 'ending';
    case 'over':   return 'gameover';
    default:       return bgm.name;
  }
}

function atk(){ return G.baseAtk + (G.lv-1)*3 + (G.weapon?G.weapon.val:0) + G.mercAtk; }
function def(){ return G.baseDef + (G.lv-1)*2 + (G.armor?G.armor.val:0); }
function stage(){ return STAGES[G.stage]; }
function mapRows(){ return stage().map; }
function tileAt(x,y){ const m=mapRows(); if(y<0||y>=m.length||x<0||x>=m[y].length) return '~'; return m[y][x]; }
function walkable(x,y){
  const t = tileAt(x,y);
  if(t==='=') return G.bridgeFixed;
  return '.tCB:s'.includes(t) || t==='.';
}
/* ---------- ピクセルアート描画 ---------- */
function px(c, x, y, w=1, h=1){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }

function drawTile(t, x, y, frame){
  switch(t){
    case '~': { // 海(アニメ)
      px('#3a6ad8', x,y,16,16);
      const o = (frame>>4)%2 ? 2 : 0;
      px('#5a8af0', x+2+o, y+3, 5,1); px('#5a8af0', x+9-o, y+8, 5,1);
      px('#5a8af0', x+4-o, y+13, 5,1); px('#2a50b0', x+11+o, y+4, 4,1);
      break; }
    case '.': { // 草原
      px('#58b84a', x,y,16,16);
      px('#6cd05a', x+3,y+4,2,1); px('#6cd05a', x+10,y+9,2,1);
      px('#48a03c', x+6,y+12,2,1); px('#48a03c', x+12,y+2,2,1);
      break; }
    case 's': case ':': {
      px('#e8d088', x,y,16,16);
      px('#f4e0a0', x+4,y+5,2,1); px('#d0b870', x+10,y+10,2,1); break; }
    case 'T': { // 木
      drawTile('.',x,y,frame);
      px('#7a4a20', x+6,y+10,4,5);
      px('#2a7a2a', x+2,y+2,12,9); px('#3a9a3a', x+3,y+1,10,3);
      px('#1a5a1a', x+3,y+9,10,2); px('#4ab84a', x+5,y+2,3,2);
      break; }
    case 'M': { // 山
      drawTile('.',x,y,frame);
      px('#8a8a9a', x+1,y+5,14,10);
      px('#6a6a7a', x+1,y+10,14,5);
      px('#aaaabc', x+5,y+2,6,5);
      px('#e8e8f4', x+6,y+1,4,3);
      break; }
    case '=': { // 橋
      px('#3a6ad8', x,y,16,16);
      if(G.bridgeFixed){
        px('#a87838', x,y+4,16,8); px('#7a5420', x,y+4,16,1); px('#7a5420', x,y+11,16,1);
        px('#c89858', x+2,y+6,3,4); px('#c89858', x+8,y+6,3,4); px('#c89858', x+13,y+6,3,4);
      } else {
        px('#a87838', x,y+5,5,6); px('#a87838', x+11,y+5,5,6);
        px('#7a5420', x+4,y+9,2,3); px('#7a5420', x+10,y+6,2,3);
      }
      break; }
    case 'C': { // 城
      drawTile('.',x,y,frame);
      px('#c8c8d8', x+1,y+4,14,11);
      px('#9898b0', x+1,y+1,3,14); px('#9898b0', x+12,y+1,3,14);
      px('#7878a0', x+2,y+0,1,2); px('#7878a0', x+13,y+0,1,2);
      px('#5858d8', x+6,y+9,4,6); px('#e8e8f8', x+5,y+5,2,2); px('#e8e8f8', x+9,y+5,2,2);
      px('#e84040', x+7,y+0,2,4);
      break; }
    case 't': { // 町
      drawTile('.',x,y,frame);
      px('#e84838', x+2,y+3,12,5); px('#f8b850', x+3,y+8,10,7);
      px('#7a4a20', x+6,y+10,4,5); px('#68c8f0', x+4,y+9,2,2); px('#68c8f0', x+10,y+9,2,2);
      px('#c03020', x+1,y+7,14,1);
      break; }
    case 'B': { // 魔王城
      drawTile('.',x,y,frame);
      px('#4a3a5a', x+1,y+3,14,12);
      px('#2a2038', x+1,y+0,3,15); px('#2a2038', x+12,y+0,3,15);
      px('#6a0808', x+6,y+9,4,6);
      px('#f8d038', x+5,y+5,2,2); px('#f8d038', x+9,y+5,2,2);
      px('#a020e0', x+7,y+0,2,3);
      break; }
    default: drawTile('.',x,y,frame);
  }
}

/* 勇者(8方向は不要、左右+上下) */
function drawHero(x,y,face,step,battle=false){
  const b = step?1:0;
  // 影
  px('rgba(0,0,0,.3)', x+3,y+14,10,2);
  // 髪(金髪)
  px('#f0d048', x+4,y+1,8,4); px('#f0d048', x+3,y+2,10,3);
  px('#c8a830', x+3,y+4,10,1);
  // 顔
  px('#f8d8b0', x+4,y+5,8,4);
  if(face>=0){ px('#303030', x+ (face===1?9:5), y+6,1,2); px('#303030', x+(face===1?11:7), y+6,1,2); }
  else { px('#303030', x+5,y+6,2,2); px('#303030', x+9,y+6,2,2); }
  // 体(青服)
  px('#3858c8', x+4,y+9,8,4);
  px('#f8d8b0', x+3,y+9,1,3); px('#f8d8b0', x+12,y+9,1,3);
  // 剣(戦闘時 or 常時ちょい見え)
  if(battle){ px('#d8d8e8', x+13,y+4,2,7); px('#8a6420', x+12,y+10,4,2); }
  // 足
  px('#604020', x+5,y+13+(b?0:0),2,2+(b?-0:0));
  px('#604020', x+9,y+13,2,2);
  if(step){ px('#604020', x+4,y+13,2,2); px('#604020', x+10,y+13,2,2); }
}

/* ---------- DOM参照 ---------- */
const $ = id => document.getElementById(id);
const msgwin=$('msgwin'), msgname=$('msgname'), msgtext=$('msgtext');
const menuwin=$('menuwin'), menutitle=$('menutitle'), menubody=$('menubody');
const overlays={ title:$('titleScr'), story:$('storyScr'), result:$('resultScr'), over:$('overScr'), end:$('endScr') };
function showOverlay(k){ for(const key in overlays) overlays[key].classList.toggle('show', key===k); }
function hideOverlays(){ showOverlay(null); }

/* ---------- メッセージシステム ---------- */
let msgQueue=[], msgDone=null, msgOpen=false;
function say(texts, name='', done=null){
  msgQueue = Array.isArray(texts)? texts.slice() : [texts];
  msgname.textContent = name; msgname.style.display = name? 'block':'none';
  msgDone = done; msgOpen = true;
  nextMsg();
}
function nextMsg(){
  if(msgQueue.length===0){
    msgwin.style.display='none'; msgOpen=false;
    if(msgDone){ const d=msgDone; msgDone=null; d(); }
    return;
  }
  msgtext.innerHTML = msgQueue.shift();
  msgwin.style.display='block';
  SE.cursor();
}

/* ---------- メニューシステム ---------- */
let menuOpen=false, currentMenu=null;
let menuItems=[], menuBtns=[], menuSel=0;
function openMenu(title, items, sub='', sel=0){
  menutitle.textContent = title;
  menubody.innerHTML = '';
  if(sub){ const d=document.createElement('div'); d.className='msub'; d.innerHTML=sub; menubody.appendChild(d); }
  menuItems = items; menuBtns = [];
  items.forEach((it,i)=>{
    const b=document.createElement('button');
    b.className='mbtn'+(it.disabled?' disabled':'');
    b.innerHTML = `<span>${it.label}</span>` + (it.price!=null? `<span class="price">${it.price}G</span>`:'');
    b.onclick = ()=>{ if(!it.disabled){ menuSel=i; it.fn(); } };
    menubody.appendChild(b); menuBtns.push(b);
  });
  menuwin.style.display='block'; menuOpen=true;
  // カーソル初期位置(無効項目はスキップ)
  menuSel = Math.max(0, Math.min(sel, items.length-1));
  if(items[menuSel] && items[menuSel].disabled){
    const f = items.findIndex(it=>!it.disabled);
    menuSel = f<0? 0 : f;
  }
  updateMenuSel();
}
function updateMenuSel(){
  menuBtns.forEach((b,i)=>b.classList.toggle('sel', i===menuSel));
  const b=menuBtns[menuSel];
  if(b && b.scrollIntoView) b.scrollIntoView({block:'nearest'});
}
function menuMove(dir){
  if(!menuOpen || menuItems.length===0) return;
  let i=menuSel, n=menuItems.length, guard=0;
  do{ i=(i+dir+n)%n; guard++; }while(menuItems[i].disabled && guard<=n);
  menuSel=i; SE.cursor(); updateMenuSel();
}
function menuConfirm(){
  if(!menuOpen) return;
  const it=menuItems[menuSel];
  if(it && !it.disabled) it.fn();
}
function closeMenu(){ menuwin.style.display='none'; menuOpen=false; currentMenu=null; menuItems=[]; menuBtns=[]; menuSel=0; }

/* ---------- アイテム(やくそう)手動使用 ---------- */
function useHerb(){
  if(G.herbs<=0){ SE.no(); return 0; }
  if(G.hp>=G.maxhp){ SE.no(); return 0; }
  G.herbs--;
  const heal = Math.min(G.herbVal, G.maxhp-G.hp);
  G.hp += heal; SE.coin();
  return heal;
}

}

function openShop(sel=0){
  const items = stage().shop.map(it=>{
    let owned=false, label=it.name;
    if(it.type==='weapon'){ owned = G.weapon && G.weapon.val>=it.val; label='🗡 '+it.name+` (攻+${it.val})`; }
    if(it.type==='armor'){ owned = G.armor && G.armor.val>=it.val; label='🛡 '+it.name+` (守+${it.val})`; }
    if(it.type==='herb'){ owned = G.herbs>=5; label='🌿 '+it.name+` (HP+${it.val}/自動使用)`; }
    return {label: owned? label+' [済]':label, price:it.price, disabled:owned, fn:()=>{
      if(G.gold<it.price){ SE.no(); closeMenu(); say('「お金がたりないようだね」','商人',openShop); return; }
      const keep = menuSel;
      G.gold-=it.price; SE.buy();
      if(it.type==='weapon') G.weapon={name:it.name,val:it.val};
      if(it.type==='armor') G.armor={name:it.name,val:it.val};
      if(it.type==='herb'){ G.herbs=Math.min(5,G.herbs+1); G.herbVal=it.val; }
      openShop(keep);
    }};
  });
  items.push({label:'◀ もどる (B)', fn:openTown});
  currentMenu='shop';
  openMenu('🛒 ショップ', items, statusLine(), sel);
}

/* ---------- ステージ管理 ---------- */
function startStage(idx, fromRetry=false){
  G.stage = idx;
  const st = stage();
  if(!fromRetry){
    G.snapshot = { gold:G.gold, weapon:G.weapon?{...G.weapon}:null, armor:G.armor?{...G.armor}:null, herbs:G.herbs, herbVal:G.herbVal };
  } else {
    Object.assign(G, { gold:G.snapshot.gold, weapon:G.snapshot.weapon?{...G.snapshot.weapon}:null,
      armor:G.snapshot.armor?{...G.snapshot.armor}:null, herbs:G.snapshot.herbs, herbVal:G.snapshot.herbVal });
  }
  G.lv=1; G.exp=0; G.expNext=14;
  G.maxhp=50; G.hp=50; G.mercAtk=0;
  G.timer=st.time; G.goddessCount=0; G.bridgeFixed=false;
  G.px=st.start[0]; G.py=st.start[1]; G.vx=0; G.vy=0; G.moving=false; G.face=1;
  G.kingSeen=false; G.battle=null; G.lastTick=-1;
  hideOverlays();
  // ストーリー画面
  playStory(st.intro, ()=>{
    G.scene='field';
    say(st.king.split('\n\n'), st.kingName || '国王', ()=>{ G.kingSeen=true; });
  });
}
function playStory(html, done){
  G.scene='story';
  showOverlay('story');
  const el=$('storyText');
  el.innerHTML=''; el.style.opacity=1;
  const full = html.replace(/\n/g,'<br>');
  let i=0; const plain=document.createElement('div');
  // タイプライター風: 行単位フェード
  const lines = full.split('<br>');
  el.innerHTML = lines.map((l,n)=>`<div style="opacity:0;transition:opacity .5s ${n*0.55}s">${l||'&nbsp;'}</div>`).join('');
  requestAnimationFrame(()=>{ el.querySelectorAll('div').forEach(d=>d.style.opacity=1); });
  let finished=false;
  const finish=()=>{ if(finished) return; finished=true; hideOverlays(); done(); };
  const t = setTimeout(finish, lines.length*550+2600);
  const skip = ()=>{ clearTimeout(t); finish(); };
  $('storySkip').onclick = e=>{ e.stopPropagation(); skip(); };
  overlays.story.onclick = skip;
}

/* ---------- バトル ---------- */
function startBattle(isBoss){
  const st = stage();
  let e;
  if(isBoss){ e = {...st.boss, isBoss:true}; SE.boss(); }
  else {
    const pool = st.enemies;
    // 弱い敵が出やすい重み付き(50/30/20)。レベルが上がると強い敵も
    const r = Math.random() + Math.min(0.35, G.lv*0.04);
    const idx = r<0.5? 0 : r<0.8? Math.min(1,pool.length-1) : pool.length-1;
    e = {...pool[idx]};
  }
  G.battle = {
    enemy:e, ehp:e.hp, emax:e.hp,
    phase:'intro', t:0, turn:0,
    heroX:60, enemyX:240, dashing:null,
    dmgPops:[], result:null, isBoss:!!isBoss,
  };
  G.scene='battle';
  $('fleebtn').style.display = 'block';
}
function endBattle(victory){
  $('fleebtn').style.display='none';
  const b=G.battle;
  G.battle=null; G.scene='field';
  if(victory && b.isBoss){
    if(G.stage >= STAGES.length-1){ showEnding(); }
    else { showResult(); }
  }
}
function addDmg(b, x, y, val, color){ b.dmgPops.push({x,y,val,t:0,color}); }
function battleUpdate(dt){
  const b=G.battle; if(!b) return;
  b.t += dt;
  b.dmgPops.forEach(p=>p.t+=dt);
  b.dmgPops = b.dmgPops.filter(p=>p.t<0.7);
  if(b.phase==='intro'){
    if(b.t>0.45){ b.phase='fight'; b.t=0; }
  } else if(b.phase==='fight'){
    if(b.t>0.34){
      b.t=0; b.turn++;
      if(b.turn%2===1){ // 勇者の攻撃
        const dmg = Math.max(1, atk() - b.enemy.def + (Math.random()*4|0));
        b.ehp -= dmg; SE.heroHit(); G.shake=0.12;
        addDmg(b, b.enemyX+10, 90, dmg, '#fff');
        b.dashing={who:'hero',t:0};
        if(b.ehp<=0){ b.ehp=0; b.phase='win'; b.t=0; }
      } else { // 敵の攻撃
        const dmg = Math.max(1, b.enemy.atk - def() + (Math.random()*4|0));
        G.hp -= dmg; SE.hit(); G.shake=0.15; G.flashRed=0.15;
        addDmg(b, b.heroX+4, 90, dmg, '#ff6a5a');
        b.dashing={who:'enemy',t:0};
        // 薬草自動使用
        if(G.hp>0 && G.hp < G.maxhp*0.35 && G.herbs>0){
          G.herbs--; const heal=Math.min(G.herbVal, G.maxhp-G.hp); G.hp+=heal;
          addDmg(b, b.heroX+4, 76, '+'+heal, '#5af07a'); SE.coin();
        }
        if(G.hp<=0){ G.hp=0; b.phase='lose'; b.t=0; }
      }
    }
    if(b.dashing){ b.dashing.t+=dt; if(b.dashing.t>0.2) b.dashing=null; }
  } else if(b.phase==='win'){
    if(b.t>0.35 && !b.result){
      b.result=true;
      if(b.isBoss){
        G.gold += b.enemy.gold;
        say([`${b.enemy.name} をたおした!!`], '', ()=>endBattle(true));
      } else {
        G.gold += b.enemy.gold; G.exp += b.enemy.exp; SE.coin();
        let lvMsg='';
        while(G.exp >= G.expNext){
          G.exp -= G.expNext; G.lv++;
          G.expNext = 14 + (G.lv-1)*16;
          G.maxhp += 14; G.hp = G.maxhp; // レベルアップで全回復!
          lvMsg += `<br><span style="color:#ffd84a">★レベル ${G.lv} にあがった! 体力全回復!</span>`;
        }
        if(lvMsg) SE.lvup();
        say(`${b.enemy.name}をたおした!  EXP+${b.enemy.exp}  ${b.enemy.gold}G${lvMsg}`, '', ()=>endBattle(true));
      }
    }
  } else if(b.phase==='lose'){
    if(b.t>0.5){ gameOver('勇者は たおれてしまった…'); }
  }
}
function flee(){
  if(!G.battle || G.battle.phase!=='fight') return;
  SE.flee();
  const wasBoss = G.battle.isBoss;
  endBattle(false);
  if(wasBoss){ // ボスから逃げたら一歩さがる
    if(walkable(G.px-1,G.py)) G.px--; else if(walkable(G.px,G.py+1)) G.py++;
  }
  say('うまく にげだした!');
}
/* ---------- フィールド ---------- */
const input = { up:false, down:false, left:false, right:false };
let moveProg = 0, moveDir = null;

function tryStartMove(){
  if(G.moving || msgOpen || menuOpen) return;
  let dx=0, dy=0;
  if(input.left){ dx=-1; G.face=-1; }
  else if(input.right){ dx=1; G.face=1; }
  else if(input.up){ dy=-1; }
  else if(input.down){ dy=1; }
  else return;
  const nx=G.px+dx, ny=G.py+dy;
  if(!walkable(nx,ny)) return;
  G.moving=true; moveDir=[dx,dy]; moveProg=0;
}
function fieldUpdate(dt){
  const onSafe = 'Ct'.includes(tileAt(G.px,G.py));
  // タイマー(町・城・メッセージ・メニュー中は停止)
  if(!onSafe && !msgOpen && !menuOpen && G.kingSeen){
    G.timer -= dt;
    const sec = Math.ceil(G.timer);
    if(G.timer<=5.2 && sec!==G.lastTick){ G.lastTick=sec; SE.tick(); }
    if(G.timer<=0){ G.timer=0; gameOver('30秒が けいかした…<br>魔王のじゅいんが 世界をのみこんだ。'); return; }
  }
  tryStartMove();
  if(G.moving){
    moveProg += dt*6.5; // 移動速度
    G.walkFrame += dt*12;
    if(moveProg>=1){
      G.px+=moveDir[0]; G.py+=moveDir[1];
      G.vx=0; G.vy=0; G.moving=false;
      onArrive();
    } else {
      G.vx = moveDir[0]*moveProg*TILE;
      G.vy = moveDir[1]*moveProg*TILE;
    }
  }
}
function onArrive(){
  const t = tileAt(G.px,G.py);
  if(t==='t'){ SE.cursor(); openTown(); return; }
  if(t==='C'){
    if(!G.kingSeen){} else { say(`${stage().kingName || '国王'}「世界を たのんだぞ 勇者よ!」`,'',null); }
    return;
  }
  if(t==='B'){ 
    say(`<em>${stage().boss.name}</em> が たちはだかった!!`, '', ()=>startBattle(true));
    return;
  }
  // エンカウント
  if(t==='.' ){
    if(Math.random() < 0.24) startBattle(false);
  }
}

/* ---------- ゲームオーバー / クリア / エンディング ---------- */
function gameOver(reason){
  $('fleebtn').style.display='none';
  G.battle=null; G.scene='over';
  SE.over();
  $('overText').innerHTML = reason + '<br><br>ステージのさいしょから やりなおそう。';
  showOverlay('over');
}
function showResult(){
  G.scene='result'; SE.clear();
  const carried = Math.floor(G.gold*0.6);
  $('resultText').innerHTML =
    `みごと ${stage().boss.name} をたおした!<br>世界は すくわれた…<br><br>`+
    `<span style="color:#9ad">― 次のステージへの持ちこし ―</span><br>`+
    `そうび:${G.weapon?G.weapon.name:'なし'} / ${G.armor?G.armor.name:'なし'}<br>`+
    `やくそう×${G.herbs}<br>`+
    `お金:${G.gold}G → <span style="color:#ffd84a">${carried}G</span> (一部持ちこし)<br>`+
    `レベルは <span style="color:#ff8a7a">1にリセット</span>される!`;
  G.gold = carried;
  showOverlay('result');
}
function showEnding(){
  G.scene='end'; SE.clear();
  $('endText').innerHTML =
    `夜の女王ニュクスは ほろび<br>月は もとの かがやきを とりもどした。<br><br>`+
    `時の女神とニュクス――<br>ひかりと やみは ようやく しずかに ねむりにつく。<br><br>`+
    `世界は もう30秒におびえることはない。<br><br>`+
    `<span style="color:#ffd84a">THANK YOU FOR PLAYING!</span><br>`+
    `あなたは しんの<em style="color:#e08040">スピード勇者</em>だ!!`;
  showOverlay('end');
}

/* ---------- 描画 ---------- */
let frame=0;
function render(){
  frame++;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,VW,VH);
  if(G.scene==='field' || (G.scene==='over'&&!G.battle)) renderField();
  else if(G.scene==='battle') renderBattle();
  else renderField(true);
  renderHUD();
}
function camPos(){
  const m=mapRows();
  const mw=m[0].length*TILE, mh=m.length*TILE;
  let cx = G.px*TILE+G.vx+8 - VW/2;
  let cy = G.py*TILE+G.vy+8 - (VH-HUD_H)/2;
  cx=Math.max(0,Math.min(mw-VW,cx)); cy=Math.max(0,Math.min(mh-(VH-HUD_H),cy));
  return [cx|0, cy|0];
}
function renderField(dimmed=false){
  const [cx,cy]=camPos();
  ctx.save();
  ctx.translate(0,HUD_H);
  if(G.shake>0){ ctx.translate((Math.random()*4-2)|0,(Math.random()*4-2)|0); }
  const m=mapRows();
  const x0=Math.floor(cx/TILE), y0=Math.floor(cy/TILE);
  for(let y=y0; y<=y0+Math.ceil((VH-HUD_H)/TILE); y++){
    for(let x=x0; x<=x0+Math.ceil(VW/TILE); x++){
      if(y<0||y>=m.length||x<0||x>=m[y].length) continue;
      drawTile(m[y][x], x*TILE-cx, y*TILE-cy+0, frame);
    }
  }
  drawHero(G.px*TILE+G.vx-cx, G.py*TILE+G.vy-cy, G.face, G.moving && (G.walkFrame|0)%2===0);
  ctx.restore();
  if(dimmed){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,VW,VH); }
}
function renderBattle(){
  const b=G.battle; if(!b){ renderField(); return; }
  ctx.save();
  if(G.shake>0){ ctx.translate((Math.random()*5-2.5)|0,(Math.random()*5-2.5)|0); }
  // 背景: 空・山・草原
  const sky=ctx.createLinearGradient(0,0,0,VH);
  sky.addColorStop(0, b.isBoss? '#2a1038':'#8ac8f0');
  sky.addColorStop(0.55, b.isBoss? '#501848':'#cfe8f8');
  sky.addColorStop(0.56, b.isBoss? '#3a2a1a':'#58b84a');
  sky.addColorStop(1, b.isBoss? '#241808':'#3a9038');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH);
  // 山なみ
  ctx.fillStyle = b.isBoss? '#1a0a24':'#7888a8';
  for(let i=0;i<6;i++){
    const mx=i*70-20;
    ctx.beginPath(); ctx.moveTo(mx,112); ctx.lineTo(mx+40,62+(i%2)*14); ctx.lineTo(mx+80,112); ctx.fill();
  }
  ctx.fillStyle = b.isBoss? 'rgba(80,20,80,.5)':'rgba(255,255,255,.5)';
  for(let i=0;i<6;i++){ const mx=i*70-20; ctx.fillRect(mx+34,62+(i%2)*14,12,8); }
  // 草テクスチャ
  ctx.fillStyle='rgba(0,0,0,.12)';
  for(let i=0;i<24;i++){ ctx.fillRect((i*31+frame/8|0)%VW, 120+(i*13)%70, 2, 5); }
  // キャラ
  let hx=b.heroX, ex=b.enemyX;
  if(b.dashing){
    const k=Math.sin(Math.min(1,b.dashing.t/0.2)*Math.PI);
    if(b.dashing.who==='hero') hx += k*(ex-hx-30);
    else ex -= k*(ex-hx-30);
  }
  if(b.phase==='intro'){
    const k=Math.min(1,b.t/0.45);
    hx = -20+(b.heroX+20)*k; ex = VW+20-(VW+20-b.enemyX)*k;
  }
  const eshrink = b.phase==='win'? Math.max(0,1-b.t*2.4) : 1;
  if(eshrink>0){
    ctx.save(); ctx.globalAlpha=eshrink;
    drawEnemy(b.enemy.kind, ex, 116 - (b.isBoss?6:0), frame);
    ctx.restore();
  }
  ctx.save(); ctx.translate(hx+16,0); ctx.scale(-1,1); // 勇者は右向き
  drawHero(-16,128,-1,(frame>>3)%2===0,true);
  ctx.restore();
  // 敵HPバー
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(VW-128,30,116,14);
  ctx.fillStyle='#fff'; ctx.font='9px DotGothic16'; ctx.fillText(b.enemy.name, VW-124,40);
  ctx.fillStyle='#400'; ctx.fillRect(VW-128,46,116,5);
  ctx.fillStyle = b.isBoss? '#e040e0':'#e84040';
  ctx.fillRect(VW-128,46,116*Math.max(0,b.ehp/b.emax),5);
  // ダメージポップ
  b.dmgPops.forEach(p=>{
    ctx.fillStyle=p.color; ctx.font='bold 13px DotGothic16';
    ctx.fillText(p.val, p.x, p.y - p.t*30);
  });
  if(b.isBoss){
    ctx.fillStyle='rgba(255,40,120,'+(0.4+0.3*Math.sin(frame/8))+')';
    ctx.font='10px DotGothic16'; ctx.fillText('!! BOSS BATTLE !!', VW/2-44, 22+HUD_H);
  }
  ctx.restore();
}
function renderHUD(){
  // 上部バー
  ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(0,0,VW,HUD_H);
  // 顔アイコン
  ctx.fillStyle='#f0d048'; ctx.fillRect(3,3,16,8);
  ctx.fillStyle='#f8d8b0'; ctx.fillRect(5,9,12,9);
  ctx.fillStyle='#303030'; ctx.fillRect(8,12,2,2); ctx.fillRect(13,12,2,2);
  // LV / HP
  ctx.fillStyle='#fff'; ctx.font='9px DotGothic16';
  ctx.fillText('LV '+G.lv, 24, 9);
  ctx.fillStyle='#222'; ctx.fillRect(24,11,86,7);
  const hr = Math.max(0,G.hp/G.maxhp);
  ctx.fillStyle = hr>0.5? '#e8e030' : hr>0.25? '#f09030':'#e84040';
  ctx.fillRect(25,12,84*hr,5);
  ctx.fillStyle='#fff'; ctx.fillText(`HP ${G.hp}/${G.maxhp}`, 114,17);
  // GOLD
  ctx.fillStyle='#ffd84a'; ctx.fillText(G.gold+'G', 114, 9);
  // タイマー(中央右)
  const sec = Math.max(0,G.timer);
  const urgent = sec<=10;
  ctx.font='bold 17px DotGothic16';
  ctx.fillStyle = urgent? (frame%20<10? '#ff4030':'#ffb0a0') : '#fff';
  const ts = sec.toFixed(1);
  ctx.fillText('⏳'+ts, VW-78, 16);
  if(G.flashRed>0){
    ctx.fillStyle=`rgba(255,0,0,${G.flashRed*1.6})`; ctx.fillRect(0,0,VW,VH);
  }
  // ステージ名(開始数秒)
  if(G.scene==='field' && G.timer>stage().time-0.01 && !G.kingSeen){
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,VH/2-14,VW,24);
    ctx.fillStyle='#ffd84a'; ctx.font='12px DotGothic16';
    const w=ctx.measureText(stage().name).width;
    ctx.fillText(stage().name,(VW-w)/2,VH/2+2);
  }
}

/* ---------- 入力 ---------- */
function bindHold(el, key){
  const on=e=>{ e.preventDefault(); audio();
    if(menuOpen){ // メニュー中はカーソル移動
      if(key==='up') menuMove(-1);
      else if(key==='down') menuMove(1);
      return;
    }
    input[key]=true; el.classList.add('on');
  };
  const off=e=>{ e.preventDefault(); input[key]=false; el.classList.remove('on'); };
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);
  el.addEventListener('pointercancel',off);
}
bindHold($('d-up'),'up'); bindHold($('d-down'),'down');
bindHold($('d-left'),'left'); bindHold($('d-right'),'right');

function pressA(){
  audio();
  if(G.scene==='title'){ titleStart(); return; }
  if(msgOpen){ nextMsg(); return; }
  if(menuOpen){ menuConfirm(); return; }
  if(G.scene==='field'){
    const t=tileAt(G.px,G.py);
    if(t==='t') openTown();
    else if(t==='C') say('国王「魔王城へ いそぐのじゃ!」');
  }
}
function pressB(){
  audio();
  if(G.scene==='title'){ titleStart(); return; }
  if(msgOpen){ nextMsg(); return; }
  if(menuOpen){ // キャンセル / もどる
    SE.cursor();
    if(currentMenu==='shop') openTown();
    else closeMenu();
    return;
  }
  if(G.scene==='battle' && G.battle && G.battle.phase==='fight'){
    const heal = useHerb();
    if(heal) addDmg(G.battle, G.battle.heroX+2, 76, '+'+heal, '#5af07a');
    return;
  }
  if(G.scene==='field'){
    const heal = useHerb();
    if(heal) say(`やくそうを使った! <span style="color:#5af07a">HP+${heal}</span> (のこり×${G.herbs})`);
    else if(G.herbs<=0) say('やくそうを 持っていない!');
    else say('体力は まんたんだ!');
  }
}
$('abtn').addEventListener('pointerdown', e=>{ e.preventDefault(); pressA(); });
$('bbtn').addEventListener('pointerdown', e=>{ e.preventDefault(); pressB(); });
msgwin.addEventListener('pointerdown', e=>{ e.preventDefault(); nextMsg(); });
$('fleebtn').addEventListener('pointerdown', e=>{ e.preventDefault(); audio(); flee(); });

window.addEventListener('keydown', e=>{
  audio();
  const k=e.key;
  if(menuOpen){ // メニュー中は上下でカーソル移動
    if(k==='ArrowUp'||k==='w'){ e.preventDefault(); menuMove(-1); return; }
    if(k==='ArrowDown'||k==='s'){ e.preventDefault(); menuMove(1); return; }
  }
  if(k==='ArrowUp'||k==='w') input.up=true;
  if(k==='ArrowDown'||k==='s') input.down=true;
  if(k==='ArrowLeft'||k==='a') input.left=true;
  if(k==='ArrowRight'||k==='d') input.right=true;
  if(k==='Enter'||k===' '||k==='z'){ e.preventDefault(); pressA(); }
  if(k==='x'||k==='Backspace'){ e.preventDefault(); pressB(); }
  if(k==='Escape'){ if(G.battle) flee(); else pressB(); }
});
window.addEventListener('keyup', e=>{
  const k=e.key;
  if(k==='ArrowUp'||k==='w') input.up=false;
  if(k==='ArrowDown'||k==='s') input.down=false;
  if(k==='ArrowLeft'||k==='a') input.left=false;
  if(k==='ArrowRight'||k==='d') input.right=false;
});

/* タイトル */
function titleStart(){
  if(G.scene!=='title') return;
  SE.lvup();
  startStage(0);
}
overlays.title.addEventListener('pointerdown', ()=>{ audio(); titleStart(); });
$('resultBtn').onclick = ()=>{ audio(); startStage(G.stage+1); };
$('retryBtn').onclick = ()=>{ audio(); startStage(G.stage, true); };
$('endBtn').onclick = ()=>{
  audio();
  Object.assign(G,{ scene:'title', stage:0, gold:100, weapon:null, armor:null, herbs:0 });
  showOverlay('title');
};

/* ---------- メインループ ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(G.shake>0) G.shake-=dt;
  if(G.flashRed>0) G.flashRed-=dt;
  if(G.scene==='field') fieldUpdate(dt);
  else if(G.scene==='battle'){
    // バトル中も時間は減る!
    if(!msgOpen){
      G.timer-=dt;
      const sec=Math.ceil(G.timer);
      if(G.timer<=5.2 && sec!==G.lastTick){ G.lastTick=sec; SE.tick(); }
      if(G.timer<=0){ G.timer=0; gameOver('戦いのさなか 30秒がけいかした…'); }
      else battleUpdate(dt);
    }
  }
  if(AC){ const want = desiredBGM(); if(want && want!==bgm.name) bgmPlay(want); }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
